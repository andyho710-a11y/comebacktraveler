name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Check build output
        run: ls -R dist

      # 用服務帳戶（GOOGLE_APPLICATION_CREDENTIALS）以 firebase-tools 部署。
      # 須用 latest：v13 不吃 GOOGLE_APPLICATION_CREDENTIALS（會 Failed to authenticate）；
      # v14/v15 驗證正常，但 deploy 會在發布後重複 release，撞到
      # 「supplied version is the current active version」(FAILED_PRECONDITION)，
      # 此時內容其實已成功上線，故將此特定錯誤視為成功；其餘錯誤照常失敗。
      - name: Deploy to Firebase Hosting
        run: |
          printf '%s' "$FIREBASE_SA" > "$GITHUB_WORKSPACE/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$GITHUB_WORKSPACE/firebase-sa.json"
          set +e
          OUT=$(npx -y firebase-tools@latest deploy --only hosting --project comeback-traveler-web --non-interactive 2>&1)
          CODE=$?
          echo "$OUT"
          rm -f "$GITHUB_WORKSPACE/firebase-sa.json"
          if [ $CODE -ne 0 ] && echo "$OUT" | grep -q "is the current active version"; then
            echo "::warning::內容已是線上最新版本（firebase-tools 重複發布的已知誤報），視為部署成功。"
            exit 0
          fi
          exit $CODE
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COMEBACK_TRAVELER_WEB }}
